<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AI 游玩日志生成器</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --p: #5B6ABF; --p2: #7C8EE5; --p-glow: rgba(91,106,191,0.3);
    --g: #52B788; --w: #F0A04B; --r: #E0556A;
    --bg: #F7F8FC; --card: #fff; --t: #1E1E2E; --s: #6C6C80; --l: #E0E0E8;
    --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --transition-speed: 0.25s;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--t); line-height: 1.65; font-size: 15px;
    max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative; overflow-x: hidden;
  }

  /* 背景装饰粒子 */
  body::before {
    content: ''; position: fixed; top:0; left:0; right:0; bottom:0; z-index:-1;
    pointer-events: none;
    background:
      radial-gradient(circle at 10% 20%, var(--p-glow) 0%, transparent 50%),
      radial-gradient(circle at 85% 60%, rgba(82,183,136,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(240,160,75,0.12) 0%, transparent 45%);
    animation: bgShift 15s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0% { opacity:.6; transform:scale(1); }
    100% { opacity:1; transform:scale(1.05); }
  }

  /* 入场动画 */
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; }
    to { opacity:1; }
  }
  @keyframes slideInLeft {
    from { opacity:0; transform:translateX(-12px); }
    to { opacity:1; transform:translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity:0; transform:translateX(12px); }
    to { opacity:1; transform:translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity:0; transform:scale(0.9); }
    to { opacity:1; transform:scale(1); }
  }
  @keyframes bounceIn {
    0% { opacity:0; transform:translateY(40px) scale(.8); }
    60% { opacity:1; transform:translateY(-6px) scale(1.02); }
    100% { transform:translateY(0) scale(1); }
  }
  @keyframes shimmer {
    0% { background-position:-200% 0; }
    100% { background-position:200% 0; }
  }
  @keyframes pulse-ring {
    0% { box-shadow:0 0 0 0 var(--p-glow); }
    70% { box-shadow:0 0 0 10px transparent; }
    100% { box-shadow:0 0 0 0 transparent; }
  }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-4px); }
  }

  .anim-in { animation: fadeInUp 0.4s ease-out both; }
  .anim-in:nth-child(1) { animation-delay:0s; }
  .anim-in:nth-child(2) { animation-delay:0.08s; }
  .anim-in:nth-child(3) { animation-delay:0.16s; }
  .anim-in:nth-child(4) { animation-delay:0.24s; }
  .anim-in:nth-child(5) { animation-delay:0.32s; }

  /* 导航栏 */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,248,252,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 10px 0 8px; display: flex; align-items: center; gap: 8px;
    transition: background var(--transition-speed);
  }
  .nav input {
    flex: 1; min-width: 0; height: 40px; padding: 0 14px;
    border: 1.5px solid var(--l); border-radius: 20px; font-size: 14px;
    background: var(--card); color: var(--t); outline: none;
    transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
  }
  .nav input:focus { border-color: var(--p2); box-shadow: 0 0 0 3px var(--p-glow); }
  .nav-tabs { display: flex; gap: 4px; background: var(--card); border-radius: 20px; padding: 3px; }
  .nav-tab {
    height: 34px; padding: 0 14px; border-radius: 18px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    background: transparent; color: var(--s); white-space: nowrap;
    transition: all var(--transition-speed) cubic-bezier(.4,0,.2,1);
  }
  .nav-tab.on { background: var(--p); color: #fff; transform:scale(1.05); }

  /* 卡片 */
  .card {
    background: var(--card); border-radius: var(--radius); padding: 18px 16px;
    margin-bottom: 12px; box-shadow: var(--shadow);
    animation: fadeInUp 0.4s ease-out both;
    transition: transform var(--transition-speed), box-shadow var(--transition-speed);
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .card-title .step-num {
    display: inline-flex; width: 24px; height: 24px; border-radius: 50%;
    background: var(--p); color: #fff; font-size: 12px; font-weight: 700;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.4s cubic-bezier(.4,0,.2,1);
  }
  .card-title .step-num.done {
    background: var(--g); animation: pulse-ring 0.6s ease-out;
  }

  /* 上传区 */
  .drop-zone {
    border: 2px dashed var(--l); border-radius: var(--radius); padding: 36px 16px;
    text-align: center; cursor: pointer; transition: all 0.3s ease; background: #FAFBFF;
    min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    position:relative; overflow:hidden;
  }
  .drop-zone::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, transparent 40%, rgba(91,106,191,0.05) 50%, transparent 60%);
    background-size:200% 200%; animation:shimmer 3s linear infinite;
    pointer-events:none; opacity:0;
  }
  .drop-zone:hover::after { opacity:1; }
  .drop-zone:active, .drop-zone.drag-over {
    border-color: var(--p2); background: #F0F3FF; transform:scale(1.01);
  }
  .drop-zone-icon { font-size: 44px; margin-bottom: 6px; animation: float 3s ease-in-out infinite; }
  .drop-zone-text { font-size: 14px; color: var(--s); line-height: 1.5; }

  /* 缩略图 */
  .thumb-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .thumb-item {
    width: calc(33.33% - 4px); position: relative; border-radius: 10px; overflow: hidden;
    background: #eee; aspect-ratio: 1;
    animation: scaleIn 0.3s ease-out both;
    transition: transform 0.2s ease;
  }
  .thumb-item:hover { transform:scale(1.03); z-index:1; }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-del {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
    background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; border: none;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1; opacity:0; transition:opacity 0.2s;
  }
  .thumb-item:hover .thumb-del { opacity:1; }
  .thumb-type {
    position: absolute; bottom: 3px; left: 4px; font-size: 10px; color: #fff;
    background: rgba(0,0,0,0.4); padding: 1px 5px; border-radius: 4px;
  }

  /* 按钮 */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; height: 48px; padding: 0 20px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    -webkit-tap-highlight-color: transparent;
    position:relative; overflow:hidden;
  }
  .btn::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    background-size:200% 200%; opacity:0; transition:opacity 0.3s;
  }
  .btn:hover::after { opacity:1; animation:shimmer 1.5s ease-in-out; }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn:disabled::after { display:none; }
  .btn-primary {
    background: linear-gradient(135deg, var(--p), #4A57A8); color: #fff;
    box-shadow: 0 2px 8px rgba(91,106,191,0.3);
  }
  .btn-primary:hover { box-shadow: 0 4px 16px rgba(91,106,191,0.45); }
  .btn-primary:active { background: #4A57A8; }
  .btn-secondary {
    background: var(--card); color: var(--p); border: 2px solid var(--p);
  }
  .btn-secondary:hover { background: #EEF0FA; }
  .btn-secondary:active { background: #DDE1F5; }
  .btn-small { width: auto; height: 36px; font-size: 13px; padding: 0 16px; border-radius: 10px; }

  /* 标签 */
  .tag {
    display: inline-block; background: #EEF0FA; color: var(--p);
    padding: 3px 10px; border-radius: 12px; font-size: 12px; margin: 2px; font-weight: 500;
    transition: transform 0.15s ease;
  }
  .tag:hover { transform:scale(1.08); }
  .tag.green { background: #E8F5E9; color: #388E3C; }
  .tag.orange { background: #FFF3E0; color: #E65100; }

  /* 输入 */
  .field-row { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .field-row > div { flex: 1; min-width: 100px; }
  .field-row label { font-size: 12px; color: var(--s); display: block; margin-bottom: 4px; font-weight: 500; }
  .field-row input {
    width: 100%; height: 42px; padding: 0 12px; border: 1.5px solid var(--l);
    border-radius: 10px; font-size: 14px; background: var(--card); color: var(--t); outline: none;
    transition: all var(--transition-speed);
  }
  .field-row input:focus { border-color: var(--p2); box-shadow:0 0 0 3px var(--p-glow); }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; z-index: 9999;
    background: #1E1E2E; color: #fff; padding: 12px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    transform: translateX(-50%) translateY(-10px);
  }
  .toast.show { opacity: 1; transform:translateX(-50%) translateY(0); }
  .toast.success { background: var(--g); }
  .toast.error { background: var(--r); }

  /* 进度 */
  .progress-bar { height: 6px; background: var(--l); border-radius: 3px; overflow: hidden; margin: 8px 0; }
  .progress-fill {
    height: 100%; border-radius: 3px; transition: width 0.4s ease;
    background: linear-gradient(90deg, var(--p), var(--p2), var(--p));
    background-size: 200% 100%; animation: shimmer 2s linear infinite;
  }

  /* 分析中 */
  .analyzing-status { text-align: center; padding: 16px 0; }
  .dot-pulse { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
  .dot-pulse span {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--p);
    animation: pulse 1.4s infinite ease-in-out both;
  }
  .dot-pulse span:nth-child(1) { animation-delay: -0.32s; }
  .dot-pulse span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes pulse { 0%,80%,100% { transform:scale(0);opacity:0.4; } 40% { transform:scale(1);opacity:1; } }

  /* 日记 */
  .diary-content { font-size: 16px; line-height: 1.85; color: #2D2D3A; }
  .diary-content p {
    margin-bottom: 14px; text-indent: 2em;
    animation: fadeInUp 0.35s ease-out both;
  }
  .diary-content p:nth-child(1) { animation-delay:0s; }
  .diary-content p:nth-child(2) { animation-delay:0.1s; }
  .diary-content p:nth-child(3) { animation-delay:0.2s; }
  .diary-content p:nth-child(4) { animation-delay:0.3s; }
  .diary-content p:nth-child(5) { animation-delay:0.4s; }
  .diary-content p:nth-child(6) { animation-delay:0.5s; }

  .info-box {
    padding: 12px 14px; border-radius: 10px; margin-bottom: 12px; font-size: 13px;
    line-height: 1.5; display: flex; align-items: flex-start; gap: 8px;
    animation: slideInLeft 0.4s ease-out both;
    transition: transform 0.2s ease;
  }
  .info-box:hover { transform:translateX(4px); }
  .info-box.weather { background: #F0F4FF; color: #4A55A2; }
  .info-box.place { background: #FEF9E7; color: #8B6914; }

  /* 照片行 */
  .photo-row {
    display: flex; align-items: flex-start; padding: 10px 0; gap: 10px;
    transition: background 0.2s, transform 0.2s;
    border-radius: 8px; padding: 10px 8px;
    cursor: pointer;
  }
  .photo-row:hover { background: rgba(91,106,191,0.04); transform:translateX(2px); }
  .photo-row + .photo-row { border-top: 1px solid #F3F3F6; }
  .photo-num { color: var(--p); font-weight: 700; font-size: 14px; min-width: 28px; padding-top: 2px; }
  .photo-info { flex: 1; font-size: 13px; }
  .photo-info .meta { color: var(--s); font-size: 12px; }

  /* 历史卡片 */
  .diary-card {
    background: var(--card); border-radius: var(--radius); overflow: hidden;
    margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    animation: fadeInUp 0.4s ease-out both;
  }
  .diary-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
  .diary-card:active { transform: scale(0.97); }
  .diary-card-thumb {
    width: 100%; height: 140px; object-fit: cover; display: block; background: #E8E8EE;
  }
  .diary-card-body { padding: 14px; }
  .diary-card-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden; }
  .diary-card-meta { font-size: 12px; color: var(--s); margin-bottom: 8px; }
  .diary-card-preview { font-size: 13px; color: #888; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }

  /* 地图 */
  .map-container { height: 260px; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }

  /* 辅助 */
  .hidden { display: none !important; }
  .text-error { color: var(--r); font-size: 13px; }
  .text-ok { color: var(--g); }
  .section-div { border-top: 1px solid #F0F0F3; margin: 14px 0; }
  .warn-box { background: #FFF9E6; padding: 10px 14px; border-radius: 10px; font-size: 13px; color: #8B6D14; margin-bottom: 10px; }
  textarea {
    width: 100%; padding: 12px; border: 1.5px solid var(--l); border-radius: 10px;
    font-size: 14px; resize: vertical; font-family: inherit; outline: none; min-height: 80px;
  }
  textarea:focus { border-color: var(--p2); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--s); }

  /* 暗色模式 */
  @media (prefers-color-scheme: dark) {
    body.dark-auto { --bg: #12122a; --card: #1a1a3e; --t: #f0f0f0; --s: #bbb; --l: #444; }
    body.dark-auto .card { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    body.dark-auto input, body.dark-auto textarea { background: #1e1e4a; color: #f0f0f0; border-color: #444; }
    body.dark-auto .drop-zone { background: #16163a; border-color: #444; }
    body.dark-auto .drop-zone:hover { background: #1a1a44; border-color: var(--p2); }
    body.dark-auto .nav-tab { background: transparent; color: #bbb; }
    body.dark-auto .nav-tab.on { background: var(--p); color: #fff; }
    body.dark-auto .tag { background: #1a3a6c; color: #aac; }
    body.dark-auto .warn-box { background: #2a2a1a; color: #ddd; }
    body.dark-auto .btn-secondary { background: #1e1e4a; color: #ddd; border-color: #555; }
    body.dark-auto .btn-secondary:active { background: #2a2a5a; }
    body.dark-auto .action-row button { background: #1e1e4a; color: #ddd; border-color: #444; }
    body.dark-auto .action-row button:active { background: var(--p); }
    body.dark-auto .diary-content { color: #eee; }
    body.dark-auto .photo-row + .photo-row { border-color: #2a2a4a; }
    body.dark-auto .section-div { border-color: #2a2a4a; }
    body.dark-auto .info-box.weather { background: #1a1a40; color: #aab; }
    body.dark-auto .info-box.place { background: #2a2a1a; color: #ccb; }
  }
  body.dark-on { --bg: #12122a; --card: #1a1a3e; --t: #f0f0f0; --s: #bbb; --l: #444; }
  body.dark-on .card { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  body.dark-on input, body.dark-on textarea { background: #1e1e4a; color: #f0f0f0; border-color: #444; }
  body.dark-on .drop-zone { background: #16163a; border-color: #444; }
  body.dark-on .drop-zone:hover { background: #1a1a44; border-color: var(--p2); }
  body.dark-on .nav-tab { background: transparent; color: #bbb; }
  body.dark-on .nav-tab.on { background: var(--p); color: #fff; }
  body.dark-on .tag { background: #1a3a6c; color: #aac; }
  body.dark-on .warn-box { background: #2a2a1a; color: #ddd; }
  body.dark-on .btn-secondary { background: #1e1e4a; color: #ddd; border-color: #555; }
  body.dark-on .btn-secondary:active { background: #2a2a5a; }
  body.dark-on .action-row button { background: #1e1e4a; color: #ddd; border-color: #444; }
  body.dark-on .action-row button:active { background: var(--p); }
  body.dark-on .diary-content { color: #eee; }
  body.dark-on .photo-row + .photo-row { border-color: #2a2a4a; }
  body.dark-on .section-div { border-color: #2a2a4a; }
  body.dark-on .info-box.weather { background: #1a1a40; color: #aab; }
  body.dark-on .info-box.place { background: #2a2a1a; color: #ccb; }
  .dark-btn { font-size: 16px; padding: 4px 6px; border-radius: 6px; background: none; border: none; cursor: pointer; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--l);
    border-top-color: var(--p);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 8px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .del-btn {
    position: absolute; top: 8px; right: 8px; font-size: 16px; padding: 4px 6px;
    border-radius: 6px; background: rgba(0,0,0,0.08); border: none;
    cursor: pointer; opacity: 0; transition: all 0.2s;
  }
  .diary-card:hover .del-btn { opacity: 0.7; }
  .del-btn:hover { opacity:1 !important; background: rgba(220,53,69,0.15); transform:scale(1.1); }
  .action-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .action-row button { flex: 1; min-width: 60px; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--l); background: var(--card); color: var(--t); font-size: 12px; cursor: pointer; }
  .action-row button:active { background: var(--p); color: #fff; }
  .action-row button.loading { opacity: 0.5; pointer-events: none; }
  .action-row button.on { background: var(--p); color: #fff; border-color: var(--p); font-weight: 700; }
  /* 聊天 */
  .chat-area { max-height: 300px; overflow-y: auto; padding: 4px 0; }
  .chat-msg { display: flex; margin-bottom: 10px; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg.ai { justify-content: flex-start; }
  .chat-bubble {
    max-width: 85%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.5; word-break: break-word;
    animation: scaleIn 0.25s ease-out both;
    position:relative;
  }
  .chat-msg.user .chat-bubble {
    background: linear-gradient(135deg, var(--p), #4A57A8);
    color: #fff; border-bottom-right-radius: 4px;
    animation-name:slideInRight;
  }
  .chat-msg.ai .chat-bubble {
    background: #F0F0F5; color: var(--t); border-bottom-left-radius: 4px;
    animation-name:slideInLeft;
  }
  body.dark-on .chat-msg.ai .chat-bubble, body.dark-auto .chat-msg.ai .chat-bubble { background: #2a2a4a; color: #eee; }
  .chat-typing { padding: 8px 14px; font-size: 13px; color: var(--s); }
  .quick-btn {
    padding: 5px 10px; border-radius: 14px; border: 1px solid var(--l);
    background: var(--card); color: var(--t); font-size: 12px; cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }
  .quick-btn:hover { border-color: var(--p2); transform:translateY(-1px); }
  .quick-btn:active { background: var(--p); color: #fff; border-color: var(--p); transform:scale(0.95); }

  /* 滤镜编辑器 */
  .filter-modal {
    position: fixed; top:0; left:0; right:0; bottom:0; z-index:9998;
    background: rgba(0,0,0,0.85);
    display:flex; align-items:center; justify-content:center;
    animation: fadeIn 0.2s ease;
  }
  .filter-panel {
    background: var(--card); border-radius:16px;
    width:95%; max-width:480px; max-height:90vh; overflow-y:auto;
    padding:20px 16px 16px;
    animation: bounceIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  .filter-preview {
    width:100%; height:280px; object-fit:contain; border-radius:10px;
    background:#1a1a1a;
    transition: filter 0.4s ease;
  }
  .filter-grid { display:flex; gap:6px; overflow-x:auto; padding:8px 0; -webkit-overflow-scrolling:touch; }
  .filter-item {
    flex-shrink:0; width:68px; text-align:center; cursor:pointer;
    transition: transform 0.2s ease;
  }
  .filter-item:hover { transform:translateY(-3px); }
  .filter-item img { width:68px; height:68px; border-radius:10px; object-fit:cover; display:block; border:2px solid transparent; transition: border-color 0.2s, box-shadow 0.2s; }
  .filter-item.active img { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-glow); animation: pulse-ring 0.5s ease-out; }
  .filter-item span { font-size:10px; display:block; margin-top:3px; color: var(--s); }
  .filter-item.active span { color: var(--p); font-weight:700; }
  .slider-row { display:flex; align-items:center; gap:8px; margin:8px 0; }
  .slider-row label { width:60px; font-size:12px; color:var(--s); flex-shrink:0; }
  .slider-row input[type=range] { flex:1; accent-color: var(--p); }
  .slider-row .val { width:32px; font-size:11px; color:var(--s); text-align:right; }
  .filter-actions { display:flex; gap:8px; margin-top:12px; }
  .filter-actions button { flex:1; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="filterModal" class="filter-modal hidden"></div>

<div id="nicknameGate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--card);border-radius:16px;padding:28px 24px;max-width:320px;width:90%;text-align:center">
    <div style="font-size:40px;margin-bottom:8px">📸</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">欢迎使用 AI 游玩日志</div>
    <div style="font-size:13px;color:var(--s);margin-bottom:16px">请输入你的昵称，用于保存和查看你的历史记录</div>
    <input type="text" id="nicknameGateInput" placeholder="你的昵称" maxlength="20" style="width:100%;height:44px;padding:0 14px;border:1.5px solid var(--l);border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:12px">
    <button class="btn btn-primary" onclick="confirmNickname()" style="width:100%">开始使用</button>
  </div>
</div>

<div class="nav">
  <input type="text" id="nicknameInput" placeholder="昵称" maxlength="20" style="max-width:80px">
  <input type="search" id="searchInput" placeholder="搜索日记..." style="display:none;flex:1;min-width:100px" oninput="loadHistory()">
  <div class="nav-tabs">
    <button class="nav-tab on" id="btnNew" onclick="switchView('new')">🆕</button>
    <button class="nav-tab" id="btnHistory" onclick="switchView('history')">📚</button>
    <button class="dark-btn" id="btnDark" onclick="toggleDark()" title="暗色模式">🌙</button>
  </div>
</div>

<!-- ====== 新分析 ====== -->
<div id="view-new">

  <div class="card">
    <div class="card-title"><span class="step-num" id="step1Num">1</span>选择照片</div>
    <div class="drop-zone" id="dropZone">
      <span class="drop-zone-icon">📷</span>
      <span class="drop-zone-text">点击选择或拖拽照片<br><small>HEIC / JPG / PNG · 支持多张</small></span>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <div class="thumb-grid" id="thumbGrid"></div>

    <div class="section-div"></div>
    <div class="card-title" style="font-size:14px">🧭 旅行信息兜底</div>
    <div class="warn-box">⚠️ iPhone 照片上传后 EXIF 会被微信剥离。请填写日期和地点。</div>
    <div class="field-row">
      <div><label>日期</label><input type="date" id="travelDate"></div>
      <div><label>时间</label><input type="time" id="travelTime"></div>
    </div>
    <div class="field-row">
      <div><label>地点</label><input type="text" id="travelPlace" placeholder="香港尖沙咀"></div>
      <div><label>地址</label><input type="text" id="travelAddr" placeholder="广东道"></div>
    </div>

    <button class="btn btn-primary" id="btnUpload" disabled>上传照片</button>
    <div class="progress-bar hidden" id="uploadProgressBar"><div class="progress-fill" id="uploadProgressFill" style="width:0%"></div></div>
    <p class="hidden" id="uploadStatus" style="font-size:13px;color:var(--s);text-align:center"></p>
  </div>

  <div id="step-analyze" class="card hidden">
    <div class="card-title"><span class="step-num" id="step2Num">2</span>AI 分析</div>
    <div id="uploadResults"></div>
    <button class="btn btn-primary" id="btnAnalyze">开始 AI 分析</button>
    <div id="analyzeProgress" class="hidden"><div class="dot-pulse"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--s);font-size:13px">MiMo 多模态模型分析中...</p></div>
    <div id="analyzeResults"></div>
  </div>

  <div id="step-diary" class="card hidden">
    <div class="card-title"><span class="step-num" id="step3Num">3</span>生成游记</div>
    <button class="btn btn-primary hidden" id="btnDiary">生成游记</button>
    <div id="diaryProgress" class="hidden"><div class="dot-pulse"><span></span><span></span><span></span></div><p style="text-align:center;color:var(--s);font-size:13px">DeepSeek 正在撰写...</p></div>
  </div>

  <div id="step-result" class="card hidden"></div>
</div>

<!-- ====== 历史记录 ====== -->
<div id="view-history" class="hidden">
  <div id="historyList"></div>
  <div id="historyDetail" class="hidden"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
  clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== 昵称 =====
let nickname = localStorage.getItem('travel_diary_nickname') || '';
const nickInput = document.getElementById('nicknameInput');
nickInput.value = nickname;
nickInput.addEventListener('change', () => { nickname = nickInput.value.trim(); localStorage.setItem('travel_diary_nickname', nickname); });

// 昵称闸门
const gate = document.getElementById('nicknameGate');
if (nickname) { gate.style.display = 'none'; }
function confirmNickname() {
  const v = document.getElementById('nicknameGateInput').value.trim();
  if (!v) { toast('请输入昵称', 'error'); return; }
  nickname = v;
  localStorage.setItem('travel_diary_nickname', nickname);
  nickInput.value = nickname;
  gate.style.display = 'none';
  toast('欢迎，' + nickname, 'success');
  loadHistory();
}

// ===== 视图切换 =====
function switchView(v) {
  document.getElementById('view-new').classList.toggle('hidden', v !== 'new');
  document.getElementById('view-history').classList.toggle('hidden', v !== 'history');
  document.getElementById('btnNew').classList.toggle('on', v === 'new');
  document.getElementById('btnHistory').classList.toggle('on', v === 'history');
  document.getElementById('searchInput').style.display = v === 'history' ? '' : 'none';
  if (v === 'history') { el('historyList').innerHTML='<div style="text-align:center;padding:60px"><div class="spinner"></div></div>'; loadHistory(); }
}

// 暗色模式
(function(){
  const s = localStorage.getItem('td_dark');
  if (s === 'on') document.body.className = 'dark-on';
  else if (s !== 'off') document.body.className = 'dark-auto';
})();
function toggleDark() {
  const b = document.body, btn = document.getElementById('btnDark');
  if (b.classList.contains('dark-on')) { b.className = 'dark-auto'; localStorage.setItem('td_dark','auto'); btn.textContent='🌙'; }
  else if (b.classList.contains('dark-auto')) { b.className = ''; localStorage.setItem('td_dark','off'); btn.textContent='☀️'; }
  else { b.className = 'dark-on'; localStorage.setItem('td_dark','on'); btn.textContent='🌙'; }
}

// ===== 状态 =====
const state = { files:[], photoIds:[], uploadResults:[], analyzeResults:[], diaryResult:null, diaryPhotos:[], chatMessages:[] };
const el = id => document.getElementById(id);

// ===== 文件 =====
const dz = el('dropZone'), fi = el('fileInput');
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
fi.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fl) {
  const v = Array.from(fl).filter(f => f.type.startsWith('image/') || /\.(heic|heif)$/i.test(f.name));
  if (!v.length) { toast('请选择图片文件', 'error'); return; }
  if (state.files.length + v.length > 20) { toast('最多 20 张', 'error'); return; }
  state.files = state.files.concat(v); renderThumbs();
  el('btnUpload').disabled = false; el('btnUpload').textContent = `上传 ${state.files.length} 张照片`;
}

function renderThumbs() {
  const g = el('thumbGrid');
  g.innerHTML = state.files.map((f,i) =>
    `<div class="thumb-item"><img src="${URL.createObjectURL(f)}"><button class="thumb-del">✕</button><span class="thumb-type">${f.name.split('.').pop().toUpperCase()}</span></div>`
  ).join('');
  g.querySelectorAll('.thumb-del').forEach((b,i) => b.addEventListener('click', e => {
    e.stopPropagation(); URL.revokeObjectURL(g.querySelectorAll('img')[i].src);
    state.files.splice(i,1); renderThumbs();
    el('btnUpload').disabled = state.files.length === 0;
    el('btnUpload').textContent = state.files.length ? `上传 ${state.files.length} 张照片` : '上传照片';
  }));
}

// ===== 上传 =====
el('btnUpload').addEventListener('click', async () => {
  el('btnUpload').disabled = true;
  const bar = el('uploadProgressBar'), fill = el('uploadProgressFill'), st = el('uploadStatus');
  bar.classList.remove('hidden'); st.classList.remove('hidden');
  state.uploadResults = []; state.photoIds = [];
  const extra = {};
  const d = el('travelDate').value, t = el('travelTime').value||'00:00';
  const p = el('travelPlace').value.trim(), a = el('travelAddr').value.trim();
  if (d) extra.client_taken_time = `${d} ${t}:00`;
  if (p) { extra.client_place_name = p; if (a) extra.client_address = a; }

  for (let i=0;i<state.files.length;i++) {
    const fd = new FormData(); fd.append('file', state.files[i]);
    Object.entries(extra).forEach(([k,v]) => fd.append(k,v));
    try {
      const r = await fetch('/upload',{method:'POST',body:fd}); const d2 = await r.json();
      if (d2.success) { state.uploadResults.push(d2); state.photoIds.push(d2.photo_id); }
      else state.uploadResults.push({success:false,filename:state.files[i].name,error:d2.detail});
    } catch(err) { state.uploadResults.push({success:false,filename:state.files[i].name,error:err.message}); }
    fill.style.width = `${((i+1)/state.files.length)*100}%`;
    st.textContent = `${i+1}/${state.files.length}`;
  }
  bar.classList.add('hidden');

  if (state.photoIds.length) {
    toast(`上传成功 ${state.photoIds.length} 张`, 'success');
    renderUploadResults();
    el('step-analyze').classList.remove('hidden'); el('btnAnalyze').classList.remove('hidden');
    el('step-analyze').scrollIntoView({behavior:'smooth'});
  } else {
    toast('上传失败', 'error');
    el('btnUpload').disabled = false;
  }
});

function renderUploadResults() {
  el('uploadResults').innerHTML = state.uploadResults.map(r => {
    const ex = r.exif||{};
    const ts = ex.taken_time||'无时间'; const gs = ex.has_gps?`有 GPS`:'无 GPS';
    const src = ex.time_source?`来源: ${ex.time_source}/${ex.location_source}`:'';
    return `<div class="photo-row"><span class="photo-num">${r.success?'✅':'❌'}</span><div class="photo-info"><strong>${r.filename}</strong> <span class="tag">${ex.image_format||'?'}</span><br><span class="meta">${ts} | ${gs}</span>${src?`<br><span class="meta">${src}</span>`:''}${r.error?`<br><span class="text-error">${r.error}</span>`:''}</div></div>`;
  }).join('');
}

// ===== 分析 (并发 + 进度) =====
el('btnAnalyze').addEventListener('click', async () => {
  el('btnAnalyze').disabled = true;
  el('analyzeProgress').classList.remove('hidden'); el('analyzeResults').innerHTML = '';

  // 进度展示
  const progressDiv = document.createElement('div');
  progressDiv.innerHTML = `<div class="progress-bar" style="margin-bottom:4px"><div class="progress-fill" id="analyzeProgressFill" style="width:0%"></div></div><p style="text-align:center;color:var(--s);font-size:12px" id="analyzeProgressText">准备分析...</p>`;
  el('analyzeProgress').prepend(progressDiv);

  try {
    const r = await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_ids:state.photoIds,geocode:true})});
    const d = await r.json();
    state.analyzeResults = d.results||[];
    // 按原顺序排序
    state.analyzeResults.sort((a,b) => state.photoIds.indexOf(a.photo_id) - state.photoIds.indexOf(b.photo_id));
  } catch(err) {
    el('analyzeResults').innerHTML = `<p class="text-error">${err.message}</p>`;
  }

  // 模拟进度（因为并发分析很快，用 SSE 轮询更好但简化处理）
  const fill = document.getElementById('analyzeProgressFill');
  const txt = document.getElementById('analyzeProgressText');
  if (fill) fill.style.width = '100%';
  if (txt) txt.textContent = `✅ ${state.analyzeResults.length} 张照片分析完成`;

  el('analyzeProgress').classList.add('hidden');
  document.getElementById('step2Num').classList.add('done');
  el('analyzeResults').innerHTML = state.analyzeResults.map((r,i) => {
    const ai=r.ai_analysis||{}, loc=r.location||{};
    return `<div class="photo-row"><span class="photo-num">#${i+1}</span><div class="photo-info"><strong>${ai.diary_sentence||''}</strong><br><span class="meta">📍${loc.city||''} ${loc.place_name||''} · ${ai.scene_type||'?'} · ${ai.activity||'?'}</span>${ai.food?.length?`<br><span class="meta">🍽️ ${ai.food.join('、')}</span>`:''}${ai.fun_fact?`<br><span class="meta">💡 ${ai.fun_fact}</span>`:''}</div></div>`;
  }).join('');

  if (state.analyzeResults.length) {
    el('step-diary').classList.remove('hidden'); el('diaryProgress').classList.remove('hidden');
    el('btnDiary').classList.add('hidden'); el('step-diary').scrollIntoView({behavior:'smooth'});
    el('btnDiary').click();
  } else { toast('分析失败', 'error'); }
  // 入场动画
  setTimeout(() => { el('analyzeResults').querySelectorAll('.photo-row').forEach((r,i) => { r.style.animationDelay = i*0.05+'s'; r.classList.add('anim-in'); }); }, 50);
});

// ===== 生成日记 =====
el('btnDiary').addEventListener('click', async () => {
  el('btnDiary').disabled = true; el('diaryProgress').classList.remove('hidden');
  try {
    const r = await fetch('/diary/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo_ids:state.photoIds,user_id:nickname||'default'})});
    state.diaryResult = await r.json();
  } catch(err) { el('step-result').classList.remove('hidden'); el('step-result').innerHTML=`<p class="text-error">${err.message}</p>`; return; }
  if (state.diaryResult?.diary_id) {
    try { const dr=await fetch(`/diary/${state.diaryResult.diary_id}`); const dd=await dr.json(); if(dd.success) state.diaryPhotos=dd.photos||[]; } catch(e){}
  }
  el('diaryProgress').classList.add('hidden'); document.getElementById('step3Num').classList.add('done');
  renderDiaryResult(); setTimeout(initMap, 200);
});

function renderDiaryResult(targetId, mapId) {
  targetId = targetId || 'step-result';
  mapId = mapId || 'map';
  const target = document.getElementById(targetId);
  const d = state.diaryResult;
  if (!d?.success) { target.classList.remove('hidden'); target.innerHTML='<p class="text-error">生成失败</p>'; return; }
  const ps = (d.content||'').split('\n\n').filter(p=>p.trim());
  target.classList.remove('hidden');
  target.innerHTML = `
    <div class="card-title">📖 ${d.title||''}</div>
    <div class="action-row">
      <button onclick="restyleDiary('轻松')">😄 轻松版</button>
      <button onclick="restyleDiary('正式')">📰 正式版</button>
      <button onclick="restyleDiary('简短')">⚡ 简短版</button>
      <button onclick="restyleDiary('科普')">🔬 科普版</button>
      <button onclick="exportMD()">📥 Markdown</button>
    <button onclick="copyDiaryText()">📋 复制文本</button>
    </div>
    <p style="font-size:13px;color:var(--s);margin-bottom:10px">📅${d.date||'?'} · 📍${d.city||'未知'} · 📷${d.photo_count||0}张</p>
    <div style="margin-bottom:10px">${(d.keywords||[]).map(k=>`<span class="tag">${k}</span>`).join('')}</div>
    ${d.weather_summary ? `<div class="info-box weather">🌤️ ${d.weather_summary}</div>` : '<div class="info-box weather" style="height:44px;background:linear-gradient(90deg,#f0f0f5 25%,#e0e0e8 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite"></div>'}
    ${d.place_intro?`<div class="info-box place">📍 ${d.place_intro}</div>`:''}
    <div id="${mapId}" class="map-container"></div>
    <div class="diary-content">${ps.map(p=>`<p>${p}</p>`).join('')}</div>
    <div class="section-div"></div>
    <div class="card-title" style="font-size:14px">💬 与 AI 讨论修改</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
      <button class="quick-btn" onclick="quickChat('纠正地点：')">📍 纠正地点</button>
      <button class="quick-btn" onclick="quickChat('补充事件：')">📝 补充事件</button>
      <button class="quick-btn" onclick="quickChat('纠正食物/物品：')">🍽️ 纠正描述</button>
      <button class="quick-btn" onclick="quickChat('帮我丰富这段日记，加入更多科普和背景知识')">🤖 AI润色</button>
    </div>
    <div id="chatMessages" class="chat-area"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button id="btnVoice" onclick="toggleVoice()" style="width:44px;height:44px;border-radius:22px;border:1.5px solid var(--l);background:var(--card);font-size:20px;cursor:pointer;flex-shrink:0" title="语音输入">🎤</button>
      <input type="text" id="chatInput" placeholder="和 AI 讨论修改... 或点🎤语音输入" style="flex:1;height:44px;padding:0 14px;border:1.5px solid var(--l);border-radius:22px;font-size:14px;outline:none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
      <button class="btn btn-primary" onclick="sendChat()" style="width:auto;height:44px;padding:0 18px;flex-shrink:0">发送</button>
    </div>
    <button class="btn btn-primary" id="btnIntegrate" onclick="integrateDiary()" style="margin-top:8px">✅ 整合进日记</button>
    <button class="btn btn-secondary" onclick="copyDiaryText()" style="margin-top:4px" id="btnCopyText">📋 复制纯文本</button>
    <div id="chatProgress" class="hidden" style="text-align:center;padding:4px"><div class="dot-pulse"><span></span><span></span><span></span></div></div>
    <div class="section-div"></div>
    <div class="card-title" style="font-size:14px">🖼️ 照片详情（点击编辑滤镜）</div>
    ${(d.photo_summaries||[]).map((p,i)=>`<div class="photo-row" onclick="openFilterEditor(${i})" style="cursor:pointer"><span class="photo-num">#${i+1}</span><div class="photo-info"><span class="meta">${p.taken_time||''} ${p.city?'📍'+p.city:''}</span> <span class="tag">${p.scene_type||'?'}</span> <span class="tag">${p.activity||'?'}</span>${p.diary_sentence?`<br>${p.diary_sentence}`:''}</div></div>`).join('')}`;

  // 恢复聊天记录
  if (targetId === 'step-result') { setTimeout(() => { renderChat(); if (state.chatMessages.length) document.getElementById('btnIntegrate').style.display = ''; }, 100); }
  setTimeout(() => _renderMap(mapId, state.diaryPhotos), 200);
}

// ===== AI 对话 =====
function quickChat(prefix) {
  const input = document.getElementById('chatInput');
  input.value = prefix;
  input.focus();
  // 光标移到末尾
  input.setSelectionRange(prefix.length, prefix.length);
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  if (!state.diaryResult?.diary_id) { toast('请先生成日记', 'error'); return; }

  state.chatMessages.push({ role: 'user', content: msg });
  input.value = '';
  state.chatMessages.push({ role: 'assistant', content: '' }); // 占位
  renderChat();
  document.getElementById('chatProgress').classList.remove('hidden');

  // 完整日记上下文（每张照片的结构化数据）
  const photosCtx = (state.diaryPhotos || []).map(p => ({
    time: p.taken_time,
    city: p.city, place: p.place_name, address: p.address,
    scene: p.scene_type, activity: p.activity,
    food: p.ai_food || p.food, objects: p.ai_objects || p.objects,
    fun_fact: p.ai_fun_fact || p.fun_fact,
    has_gps: p.has_gps, lat: p.latitude, lng: p.longitude,
    diary_sentence: p.diary_sentence,
  }));
  const diaryCtx = {
    title: state.diaryResult.title,
    date: state.diaryResult.date,
    city: state.diaryResult.city,
    place_intro: state.diaryResult.place_intro,
    weather: state.diaryResult.weather_summary,
    photos: photosCtx,
  };

  try {
    const r = await fetch(`/diary/${state.diaryResult.diary_id}/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.chatMessages.filter(m => m.role !== 'assistant' || m.content), diary_context: diaryCtx }),
    });
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            if (json.c) {
              fullText += json.c;
              state.chatMessages[state.chatMessages.length - 1].content = fullText;
              renderChat();
            }
            if (json.e) { fullText += '\n[错误: ' + json.e + ']'; }
          } catch (e) {}
        }
      }
    }

    if (!fullText) {
      state.chatMessages[state.chatMessages.length - 1].content = 'AI 未返回内容，请重试';
    }
  } catch (err) {
    state.chatMessages[state.chatMessages.length - 1].content = '网络错误：' + err.message;
  }
  document.getElementById('chatProgress').classList.add('hidden');
  renderChat();
}

async function integrateDiary() {
  if (!state.diaryResult?.diary_id) return;
  const btn = document.getElementById('btnIntegrate');
  btn.disabled = true; btn.textContent = '整合中...';
  try {
    const r = await fetch(`/diary/${state.diaryResult.diary_id}/integrate`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.chatMessages }),
    });
    const d = await r.json();
    if (d.success) {
      state.diaryResult.content = d.content;
      state.diaryResult.title = d.title;
      state.diaryResult.keywords = d.keywords;
      // 判断当前在哪个视图，渲染到正确容器
      const inHistory = !document.getElementById('view-history').classList.contains('hidden');
      renderDiaryResult(inHistory ? 'historyCard' : 'step-result', inHistory ? 'mapDetail' : 'map');
      toast('日记已更新', 'success');
      // 保留聊天记录，AI 可以继续对话
      state.chatMessages.push({ role: 'assistant', content: '✅ 日记已更新！还有什么要修改的吗？' });
      renderChat();
      btn.style.display = 'none';
    } else {
      toast(d.detail || '整合失败', 'error');
    }
  } catch (err) { toast(err.message, 'error'); }
  btn.disabled = false; btn.textContent = '✅ 整合进日记';
}

function renderChat() {
  const area = document.getElementById('chatMessages');
  area.innerHTML = state.chatMessages.map(m =>
    '<div class="chat-msg ' + (m.role === 'user' ? 'user' : 'ai') + '">' +
    '<div class="chat-bubble">' + m.content.replace(/\n/g, '<br>') + '</div></div>'
  ).join('');
  area.scrollTop = area.scrollHeight;
}

// ===== 历史记录 =====
async function loadHistory() {
  const uid = nickname||'default';
  const q = document.getElementById('searchInput').value.trim();
  el('historyDetail').classList.add('hidden'); el('historyDetail').innerHTML='';
  el('historyList').innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';
  try {
    const url = q
      ? `/diary/?user_id=${encodeURIComponent(uid)}&limit=50&q=${encodeURIComponent(q)}`
      : `/diary/?user_id=${encodeURIComponent(uid)}&limit=50`;
    const r=await fetch(url);
    const d=await r.json();
    if(!d.success||!d.diaries.length){ el('historyList').innerHTML='<div class="empty-state">📭<br>还没有日记记录</div>'; return; }
    el('historyList').innerHTML = d.diaries.map((di,i) => `
      <div class="diary-card" style="position:relative;animation-delay:${i*0.06}s" onclick="showDiaryDetail(${di.id})">
        <div class="diary-card-body">
          <div class="diary-card-title">${di.title}</div>
          <div class="diary-card-meta">📅${di.date} · 📍${di.city||'未知'} · 📷${(di.photo_ids||[]).length}张</div>
          <div class="diary-card-preview">${(di.content||'').slice(0,100)}...</div>
          <div style="margin-top:4px">${(di.keywords||[]).slice(0,4).map(k=>`<span class="tag">${k}</span>`).join('')}</div>
        </div>
        <button class="del-btn" onclick="event.stopPropagation();deleteDiary(${di.id})" title="删除">🗑️</button>
      </div>
    `).join('');
  } catch(err){ el('historyList').innerHTML=`<p class="text-error">${err.message}</p>`; }
}

async function deleteDiary(id) {
  if (!confirm('确定删除这篇日记吗？')) return;
  try {
    const r = await fetch(`/diary/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (d.success) { toast('已删除', 'success'); loadHistory(); }
    else toast(d.detail || '删除失败', 'error');
  } catch (err) { toast(err.message, 'error'); }
}

async function showDiaryDetail(id) {
  el('historyList').classList.add('hidden'); el('historyDetail').classList.remove('hidden');
  el('historyDetail').innerHTML='<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';
  try {
    const r=await fetch(`/diary/${id}`); const d=await r.json();
    if(!d.success){el('historyDetail').innerHTML='<p class="text-error">加载失败</p>';return;}
    const diary=d.diary, photos=d.photos||[];
    state.diaryResult=diary; state.diaryPhotos=photos;
    state.chatMessages = (d.chat_history && d.chat_history.length) ? d.chat_history : []; // 恢复对话
    el('historyDetail').innerHTML = '<button class="btn btn-secondary btn-small" onclick="backToHistory()">← 返回</button><div class="card" style="margin-top:10px" id="historyCard"></div>';
    renderDiaryResult('historyCard', 'mapDetail');
  } catch(err){ el('historyDetail').innerHTML=`<p class="text-error">${err.message}</p>`; }
}

function backToHistory() { el('historyList').classList.remove('hidden'); el('historyDetail').classList.add('hidden'); }

// ===== 地图 =====
function _renderMap(mapId, photos) {
  const el2 = document.getElementById(mapId); if (!el2) return;
  const markers = (photos||[]).filter(p => p.has_gps && p.latitude && p.longitude);
  if (!markers.length) { el2.style.display='none'; return; }
  if (el2._leafletMap) { el2._leafletMap.remove(); }
  const map = L.map(mapId, { attributionControl: false }).setView([markers[0].latitude, markers[0].longitude], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
  markers.forEach(p => { L.marker([p.latitude, p.longitude]).addTo(map).bindPopup(`<strong>${p.city||''} ${p.place_name||''}</strong><br>${p.diary_sentence||''}<br><small>${p.taken_time||''}</small>`); });
  if (markers.length > 1) map.fitBounds(markers.map(p=>[p.latitude, p.longitude]), {padding:[30,30]});
  el2._leafletMap = map;
}
function initMap() { _renderMap('map', state.diaryPhotos); }
function initMapDetail() { _renderMap('mapDetail', state.diaryPhotos); }

async function restyleDiary(style) {
  if (!state.diaryResult || !state.diaryResult.diary_id) return;
  const inHistory = !document.getElementById('view-history').classList.contains('hidden');
  const container = document.getElementById(inHistory ? 'historyCard' : 'step-result');
  // 按钮 loading 特效 — 只选当前视图内的按钮
  const btns = container.querySelectorAll('.action-row button');
  btns.forEach(b => { b.classList.add('loading'); b.classList.remove('on'); });
  // 高亮当前点击的按钮
  const clickedBtn = Array.from(btns).find(b => b.textContent.includes(style));
  let origText = '';
  if (clickedBtn) { origText = clickedBtn.textContent; clickedBtn.classList.add('on'); clickedBtn.textContent = '...'; }
  state._currentStyle = style;

  let needsCleanup = true;
  try {
    const r = await fetch(`/diary/${state.diaryResult.diary_id}/restyle`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({style}) });
    const d = await r.json();
    if (d.success) {
      needsCleanup = false; // DOM 会被 renderDiaryResult 重建
      state.diaryResult.content = d.content;
      state.diaryResult.title = d.title;
      state.diaryResult.keywords = d.keywords;
      renderDiaryResult(inHistory ? 'historyCard' : 'step-result', inHistory ? 'mapDetail' : 'map');
      // 新渲染后高亮当前风格
      setTimeout(() => {
        const newContainer = document.getElementById(inHistory ? 'historyCard' : 'step-result');
        const newBtns = newContainer.querySelectorAll('.action-row button');
        newBtns.forEach(b => { if (b.textContent.includes(style)) b.classList.add('on'); });
      }, 100);
      toast('已切换为' + style + '风格', 'success');
    } else toast(d.detail || '切换失败', 'error');
  } catch (err) { toast(err.message, 'error'); }
  finally {
    if (needsCleanup) {
      btns.forEach(b => b.classList.remove('loading'));
      if (clickedBtn && clickedBtn.textContent === '...') clickedBtn.textContent = origText;
    }
  }
}

// ===== 滤镜编辑器 =====
const FILTER_PRESETS = {
  '原图': '',
  '暖调': 'brightness(1.1) saturate(1.3) sepia(0.2) hue-rotate(-10deg)',
  '冷调': 'brightness(1.05) saturate(1.1) hue-rotate(10deg)',
  '复古': 'sepia(0.5) contrast(0.9) brightness(0.9)',
  '戏剧': 'contrast(1.3) saturate(1.2) brightness(0.9)',
  '柔焦': 'brightness(1.1) contrast(0.9) saturate(0.8)',
  '黑白': 'grayscale(1) contrast(1.1)',
  '富士': 'contrast(1.1) saturate(1.1) brightness(1.05) hue-rotate(-5deg)',
  '柯达': 'contrast(1.05) saturate(0.9) brightness(1.05) sepia(0.15)',
  '美食': 'saturate(1.5) contrast(1.05) brightness(1.1)',
};

let filterState = { photoIdx: -1, filter: '', brightness: 1, contrast: 1, saturation: 1, sepia: 0, userId: '' };

function openFilterEditor(photoIdx) {
  const photo = (state.diaryPhotos || [])[photoIdx];
  if (!photo) { toast('照片信息不完整', 'error'); return; }

  // 构建图片 URL
  let imgUrl = `/photos/${photo.file_basename || ''}`;
  if (!photo.file_basename) { toast('照片文件未找到', 'error'); return; }

  filterState = { photoIdx, filter: '', brightness: 1, contrast: 1, saturation: 1, sepia: 0, userId: nickname || 'default' };

  const modal = document.getElementById('filterModal');
  modal.classList.remove('hidden');
  modal.innerHTML = `
    <div class="filter-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong>🎨 照片滤镜</strong>
        <button onclick="closeFilterEditor()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--s)">✕</button>
      </div>
      <img id="filterPreview" src="${imgUrl}" class="filter-preview" style="filter:${buildFilterCSS()}">

      <div style="font-size:13px;font-weight:600;margin:10px 0 4px;color:var(--p)">滤镜预设</div>
      <div class="filter-grid" id="filterGrid"></div>

      <div style="font-size:13px;font-weight:600;margin:10px 0 4px;color:var(--p)">手动调整</div>
      <div class="slider-row"><label>亮度</label><input type="range" id="sliderBright" min="0" max="2" step="0.05" value="1" oninput="updateSlider()"><span class="val" id="valBright">0</span></div>
      <div class="slider-row"><label>对比度</label><input type="range" id="sliderContrast" min="0" max="2" step="0.05" value="1" oninput="updateSlider()"><span class="val" id="valContrast">0</span></div>
      <div class="slider-row"><label>饱和度</label><input type="range" id="sliderSaturation" min="0" max="2" step="0.05" value="1" oninput="updateSlider()"><span class="val" id="valSaturation">0</span></div>
      <div class="slider-row"><label>暖色调</label><input type="range" id="sliderSepia" min="0" max="1" step="0.05" value="0" oninput="updateSlider()"><span class="val" id="valSepia">0</span></div>

      <div class="filter-actions">
        <button class="btn btn-secondary btn-small" onclick="aiSuggestFilter()">🤖 AI推荐滤镜</button>
        <button class="btn btn-primary btn-small" onclick="exportFilteredImage()">📥 导出</button>
        <button class="btn btn-secondary btn-small" onclick="closeFilterEditor()">关闭</button>
      </div>
    </div>
  `;

  // 渲染滤镜预设网格
  const grid = document.getElementById('filterGrid');
  grid.innerHTML = Object.entries(FILTER_PRESETS).map(([name, css], i) => `
    <div class="filter-item${css===filterState.filter?' active':''}" onclick="applyPreset('${name}', '${css.replace(/'/g,"\\'")}')">
      <img src="${imgUrl}" style="filter:${css||'none'}">
      <span>${name}</span>
    </div>
  `).join('');

  modal.onclick = (e) => { if (e.target === modal) closeFilterEditor(); };
}

function buildFilterCSS() {
  const { brightness, contrast, saturation, sepia } = filterState;
  let css = `brightness(${brightness}) contrast(${contrast}) saturate(${saturation})`;
  if (sepia > 0) css += ` sepia(${sepia})`;
  if (filterState.filter) css += ' ' + filterState.filter;
  return css;
}

function applyPreset(name, css) {
  filterState.filter = css;
  document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.filter-item').forEach(el => {
    if (el.querySelector('span').textContent === name) el.classList.add('active');
  });
  updatePreview();
}

function updateSlider() {
  filterState.brightness = parseFloat(document.getElementById('sliderBright').value);
  filterState.contrast = parseFloat(document.getElementById('sliderContrast').value);
  filterState.saturation = parseFloat(document.getElementById('sliderSaturation').value);
  filterState.sepia = parseFloat(document.getElementById('sliderSepia').value);
  document.getElementById('valBright').textContent = ((filterState.brightness-1)*100).toFixed(0);
  document.getElementById('valContrast').textContent = ((filterState.contrast-1)*100).toFixed(0);
  document.getElementById('valSaturation').textContent = ((filterState.saturation-1)*100).toFixed(0);
  document.getElementById('valSepia').textContent = (filterState.sepia*100).toFixed(0);
  updatePreview();
}

function updatePreview() {
  const img = document.getElementById('filterPreview');
  if (img) img.style.filter = buildFilterCSS();
}

async function aiSuggestFilter() {
  const photo = (state.diaryPhotos || [])[filterState.photoIdx];
  if (!photo) return;
  toast('AI 正在分析...', '');
  try {
    const r = await fetch('/analyze/filter-suggest', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({photo_id:photo.photo_id}) });
    const d = await r.json();
    if (d.success && d.filter_name) {
      // 找到最接近的预设或直接建议
      const css = d.filter_css || FILTER_PRESETS[d.filter_name];
      if (css) { applyPreset(d.filter_name, css); }
      toast(d.suggestion || `AI 推荐: ${d.filter_name}`, 'success');
    } else {
      toast(d.detail || 'AI 分析失败', 'error');
    }
  } catch (err) { toast('AI 请求失败: ' + err.message, 'error'); }
}

function exportFilteredImage() {
  const img = document.getElementById('filterPreview');
  if (!img) return;
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth || 1024;
  canvas.height = img.naturalHeight || 768;
  const ctx = canvas.getContext('2d');
  ctx.filter = buildFilterCSS();
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `travel_filtered_${Date.now()}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
    toast('已导出滤镜照片', 'success');
  }, 'image/jpeg', 0.95);
}

function closeFilterEditor() {
  document.getElementById('filterModal').classList.add('hidden');
  document.getElementById('filterModal').innerHTML = '';
}

function copyDiaryText() {
  const d = state.diaryResult;
  if (!d) return;
  const text = [d.title||'', '', `📅 ${d.date||''} · 📍 ${d.city||''}`, '', d.weather_summary||'', d.place_intro||'', '', d.content||''].filter(l=>l).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板','success')).catch(() => toast('复制失败','error'));
}

// ===== 语音识别 =====
let voiceRecognition = null;
let isVoiceActive = false;
function toggleVoice() {
  const btn = document.getElementById('btnVoice');
  if (isVoiceActive) { stopVoice(); return; }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { toast('浏览器不支持语音识别','error'); return; }

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.interimResults = true;
  voiceRecognition.continuous = true;

  voiceRecognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
    }
    document.getElementById('chatInput').value = transcript;
  };
  voiceRecognition.onerror = (event) => {
    console.error('Voice error:', event.error);
    if (event.error === 'no-speech') return;
    stopVoice();
    toast('语音识别出错: ' + event.error, 'error');
  };
  voiceRecognition.onend = () => { stopVoice(); };

  voiceRecognition.start();
  isVoiceActive = true;
  btn.textContent = '🔴';
  btn.style.background = 'var(--r)';
  btn.style.color = '#fff';
  btn.style.borderColor = 'var(--r)';
  toast('正在聆听...', 'success');
}
function stopVoice() {
  if (voiceRecognition) { voiceRecognition.stop(); voiceRecognition = null; }
  isVoiceActive = false;
  const btn = document.getElementById('btnVoice');
  btn.textContent = '🎤';
  btn.style.background = 'var(--card)';
  btn.style.color = '';
  btn.style.borderColor = 'var(--l)';
}

function exportMD() {
  const d = state.diaryResult;
  if (!d) return;
  const lines = [
    '# ' + d.title, '',
    '> ' + d.date + ' · ' + (d.city||'未知') + ' · ' + (d.photo_count||0) + ' 张', '',
    d.weather_summary ? '🌤️ ' + d.weather_summary + '\n' : '',
    d.place_intro ? '📍 ' + d.place_intro + '\n' : '',
    d.content, '',
    '**关键词**: ' + (d.keywords||[]).join(' · '),
  ];
  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (d.title || '游记') + '.md';
  a.click(); toast('已下载', 'success');
}
</script>
